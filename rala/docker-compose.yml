version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: rala-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  influxdb:
    image: influxdb:2.0
    container_name: rala-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=raala-admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=raala-password123
      - DOCKER_INFLUXDB_INIT_ORG=raala
      - DOCKER_INFLUXDB_INIT_BUCKET=raala
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=raala-super-secret-token
    restart: unless-stopped
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: rala-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: rala-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - INFLUX_URL=http://influxdb:8086
    depends_on:
      - redis
      - influxdb
    restart: unless-stopped

  stream-processor:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: rala-stream-processor
    command: ["python", "stream_processor.py"]
    environment:
      - REDIS_HOST=redis
      - INFLUX_URL=http://influxdb:8086
    depends_on:
      - redis
      - influxdb
    restart: unless-stopped

  rule-engine:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: rala-rule-engine
    command: ["python", "rule_engine.py"]
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped

  mock-sensors:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: rala-mock-sensors
    command: ["python", "mock_sensors.py"]
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: rala-frontend
    ports:
      - "8080:80"
    volumes:
      - ./simulator:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  redis_data:
  influxdb_data:
  influxdb_config:
  mosquitto_data:
  mosquitto_log:
